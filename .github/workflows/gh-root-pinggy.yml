name: gh 分支 root Pinggy 隧道

on:
  push:
    branches:
      - gh
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: gh-root-pinggy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  root-pinggy:
    name: 以 root 启动 sshdev
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SSHDEV_CI_KEEPALIVE_SECONDS: ${{ vars.SSHDEV_CI_KEEPALIVE_SECONDS || '180' }}
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 下载最新 release 并开启 Pinggy 隧道
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SSHDEV_CI_AUTHORIZED_KEYS: ${{ secrets.SSHDEV_CI_AUTHORIZED_KEYS }}
        run: |
          set -euo pipefail

          sudo --preserve-env=GITHUB_TOKEN,GITHUB_REPOSITORY,RUNNER_TEMP,SSHDEV_CI_AUTHORIZED_KEYS,SSHDEV_CI_KEEPALIVE_SECONDS bash <<'ROOT'
          set -euo pipefail

          work_dir="${RUNNER_TEMP}/sshdev-ci"
          install -d -m 700 "${work_dir}"

          echo "SSHDEV_CI_ROOT_CONTEXT user=$(id -un) uid=$(id -u)"

          missing_tools=""
          for tool in curl jq ssh ssh-keygen; do
            if ! command -v "${tool}" >/dev/null 2>&1; then
              missing_tools="${missing_tools} ${tool}"
            fi
          done

          if [ -n "${missing_tools}" ]; then
            apt-get update
            apt-get install -y curl jq openssh-client
          fi

          release_json="${work_dir}/release.json"
          curl -fsSL \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/latest" \
            -o "${release_json}"

          release_tag="$(jq -r '.tag_name' "${release_json}")"
          asset_id="$(jq -r '.assets[] | select(.name == "sshdev-linux-amd64") | .id' "${release_json}" | head -n 1)"

          if [ -z "${asset_id}" ] || [ "${asset_id}" = "null" ]; then
            echo "::error::最新 release 中没有找到 sshdev-linux-amd64 资产"
            exit 1
          fi

          curl -fsSL \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/octet-stream" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/assets/${asset_id}" \
            -o /usr/local/bin/sshdev
          chmod 0755 /usr/local/bin/sshdev
          /usr/local/bin/sshdev --help >/dev/null

          echo "SSHDEV_CI_RELEASE=${release_tag}"

          selfcheck_key="${work_dir}/selfcheck_key"
          ssh-keygen -q -t ed25519 -N "" -f "${selfcheck_key}" -C "sshdev-ci-selfcheck"

          authorized_keys="${work_dir}/authorized_keys"
          cat "${selfcheck_key}.pub" > "${authorized_keys}"
          if [ -n "${SSHDEV_CI_AUTHORIZED_KEYS:-}" ]; then
            printf '\n%s\n' "${SSHDEV_CI_AUTHORIZED_KEYS}" >> "${authorized_keys}"
            echo "SSHDEV_CI_EXTERNAL_KEY_CONFIGURED=1"
          else
            echo "SSHDEV_CI_EXTERNAL_KEY_CONFIGURED=0"
          fi

          install -d -m 700 /root/.ssh
          install -m 600 "${authorized_keys}" /root/.ssh/authorized_keys

          log_file="${work_dir}/sshdev.log"
          touch "${log_file}"
          tail -n +1 -f "${log_file}" &
          tail_pid="$!"
          server_pid=""

          cleanup() {
            if [ -n "${server_pid}" ] && kill -0 "${server_pid}" >/dev/null 2>&1; then
              kill "${server_pid}" >/dev/null 2>&1 || true
              wait "${server_pid}" >/dev/null 2>&1 || true
            fi
            kill "${tail_pid}" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          SSHDEV_LISTEN=127.0.0.1:2222 \
          SSHDEV_AUTHORIZED_KEYS_FILES=/root/.ssh/authorized_keys \
          SSHDEV_HOST_KEY_BUILTIN=1 \
          SSHDEV_SHELL=/bin/bash \
          SSHDEV_PINGGY=1 \
          SHELL=/bin/bash \
          /usr/local/bin/sshdev run </dev/null >"${log_file}" 2>&1 &
          server_pid="$!"

          login_ok=0
          for _ in $(seq 1 60); do
            if ssh \
              -i "${selfcheck_key}" \
              -p 2222 \
              -o BatchMode=yes \
              -o ConnectTimeout=2 \
              -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              root@127.0.0.1 \
              'printf "SSHDEV_CI_ROOT_LOGIN_OK user=%s uid=%s shell=%s\n" "$(id -un)" "$(id -u)" "${SHELL:-}"'; then
              login_ok=1
              break
            fi

            if ! kill -0 "${server_pid}" >/dev/null 2>&1; then
              echo "::error::sshdev 进程提前退出"
              wait "${server_pid}"
              exit 1
            fi
            sleep 2
          done

          if [ "${login_ok}" != "1" ]; then
            echo "::error::无法通过 sshdev 以 root 身份登录自检"
            exit 1
          fi

          tunnel=""
          for _ in $(seq 1 60); do
            tunnel="$(grep -Eo 'tcp://[^[:space:]]+' "${log_file}" | tail -n 1 || true)"
            if [ -n "${tunnel}" ]; then
              break
            fi
            sleep 1
          done

          if [ -n "${tunnel}" ]; then
            echo "SSHDEV_CI_PINGGY_TUNNEL=${tunnel}"
          else
            echo "::warning::未能从日志中提取 Pinggy tcp 地址，请查看 sshdev 原始输出"
          fi

          keepalive_seconds="${SSHDEV_CI_KEEPALIVE_SECONDS:-180}"
          case "${keepalive_seconds}" in
            ''|*[!0-9]*) keepalive_seconds=180 ;;
          esac
          if [ "${keepalive_seconds}" -gt 900 ]; then
            keepalive_seconds=900
          fi

          echo "SSHDEV_CI_KEEPALIVE_SECONDS=${keepalive_seconds}"
          end_at=$((SECONDS + keepalive_seconds))
          while [ "${SECONDS}" -lt "${end_at}" ]; do
            if ! kill -0 "${server_pid}" >/dev/null 2>&1; then
              echo "::error::sshdev 进程在保活期间退出"
              wait "${server_pid}"
              exit 1
            fi
            sleep 5
          done
          ROOT
